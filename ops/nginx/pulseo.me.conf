# Public site
server {
    listen 80;
    listen [::]:80;
    server_name pulseo.me www.pulseo.me;

    return 301 https://pulseo.me$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.pulseo.me;

    ssl_certificate /etc/letsencrypt/live/pulseo.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pulseo.me/privkey.pem;

    return 301 https://pulseo.me$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pulseo.me;

    ssl_certificate /etc/letsencrypt/live/pulseo.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pulseo.me/privkey.pem;

    access_log /var/log/nginx/pulseo.public.access.log;
    error_log /var/log/nginx/pulseo.public.error.log;

    location / {
        proxy_pass http://127.0.0.1:7860;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Admin site
server {
    listen 80;
    listen [::]:80;
    server_name admin.pulseo.me;

    return 301 https://admin.pulseo.me$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.pulseo.me;

    ssl_certificate /etc/letsencrypt/live/pulseo.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pulseo.me/privkey.pem;

    access_log /var/log/nginx/pulseo.admin.access.log;
    error_log /var/log/nginx/pulseo.admin.error.log;

    auth_basic "Restricted admin";
    auth_basic_user_file /etc/nginx/.htpasswd_pulseo_admin;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
